name: Dependency Scan
on:
  push:
    branches: [main, staging]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fahim017803/mdfahim.dev:latest
          format: table
          exit-code: 0
name: Secret Scan
# এই workflow এর নাম — GitHub Actions এ এই নামে দেখাবে

on:
  push:
    branches: [main]
# main branch এ কোনো push হলে automatically run হবে

jobs:
  secret-scan:
  # job এর নাম
    runs-on: ubuntu-latest
    # GitHub এর ubuntu server এ run হবে
    steps:
      - uses: actions/checkout@v4
        # repo এর code নামিয়ে আনবে
        with:
          fetch-depth: 0
          # সব commit history নামাবে — Gitleaks পুরনো commit ও check করে

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        # Gitleaks tool দিয়ে scan করবে
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub automatically এই token দেয় — আলাদা করে set করতে হবে না